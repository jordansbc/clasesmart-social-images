<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <!-- Background -->
  <rect width="1080" height="1350" fill="#1E3A8A"/>

  <!-- Subtle accent shapes -->
  <circle cx="120" cy="160" r="180" fill="#172E6E"/>
  <circle cx="980" cy="1180" r="220" fill="#172E6E"/>
  <circle cx="930" cy="240" r="70" fill="#F97316" opacity="0.18"/>
  <circle cx="150" cy="980" r="46" fill="#F97316" opacity="0.18"/>
  <circle cx="900" cy="900" r="28" fill="#FFF7ED" opacity="0.15"/>
  <circle cx="220" cy="620" r="20" fill="#FFF7ED" opacity="0.15"/>
  <rect x="-40" y="-40" width="1160" height="1430" rx="0" fill="none" stroke="#F97316" stroke-width="0" />

  <!-- Top accent bar -->
  <rect x="440" y="70" width="200" height="14" rx="7" fill="#F97316"/>

  <!-- ===== OWL (basic vector shapes) ===== -->
  <g>
    <!-- Ear tufts -->
    <path d="M455 235 L500 300 L440 300 Z" fill="#F97316"/>
    <path d="M625 235 L640 300 L580 300 Z" fill="#F97316"/>
    <!-- Body -->
    <ellipse cx="540" cy="370" rx="135" ry="150" fill="#F97316"/>
    <!-- Belly -->
    <ellipse cx="540" cy="405" rx="92" ry="100" fill="#FFF7ED"/>
    <!-- Eye discs -->
    <circle cx="492" cy="330" r="52" fill="#FFF7ED"/>
    <circle cx="588" cy="330" r="52" fill="#FFF7ED"/>
    <!-- Eyes -->
    <circle cx="492" cy="330" r="30" fill="#1E3A8A"/>
    <circle cx="588" cy="330" r="30" fill="#1E3A8A"/>
    <!-- Eye highlights -->
    <circle cx="502" cy="320" r="10" fill="#FFF7ED"/>
    <circle cx="598" cy="320" r="10" fill="#FFF7ED"/>
    <!-- Beak -->
    <path d="M540 360 L562 392 L518 392 Z" fill="#1E3A8A"/>
    <!-- Wings -->
    <path d="M413 360 q-22 50 18 92 q-30 -42 -8 -92 Z" fill="#EA6A0C"/>
    <path d="M667 360 q22 50 -18 92 q30 -42 8 -92 Z" fill="#EA6A0C"/>
    <!-- Feet -->
    <rect x="505" y="510" width="14" height="26" rx="6" fill="#1E3A8A"/>
    <rect x="561" y="510" width="14" height="26" rx="6" fill="#1E3A8A"/>
    <!-- Branch -->
    <rect x="420" y="534" width="240" height="16" rx="8" fill="#FFF7ED" opacity="0.85"/>
  </g>

  <!-- ===== HOOK PANEL ===== -->
  <rect x="80" y="610" width="920" height="460" rx="44" fill="#FFF7ED"/>
  <rect x="80" y="610" width="920" height="460" rx="44" fill="none" stroke="#F97316" stroke-width="6"/>

  <g font-family="DejaVu Sans, sans-serif" fill="#1E3A8A" text-anchor="middle" font-weight="bold">
    <text x="540" y="730" font-size="92">¿Sigues armando</text>
    <text x="540" y="838" font-size="92">las boletas</text>
    <text x="540" y="946" font-size="92" fill="#F97316">a mano?</text>
  </g>

  <!-- Small divider -->
  <rect x="490" y="985" width="100" height="8" rx="4" fill="#F97316"/>

  <!-- ===== SUPPORTING LINE ===== -->
  <g font-family="DejaVu Sans, sans-serif" fill="#FFF7ED" text-anchor="middle">
    <text x="540" y="1160" font-size="50" font-weight="bold">ClaseSmart las genera</text>
    <text x="540" y="1220" font-size="50" font-weight="bold">por ti en minutos.</text>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g font-family="DejaVu Sans, sans-serif" text-anchor="middle">
    <text x="528" y="1305" font-size="46" font-weight="bold" fill="#FFF7ED">Clase</text>
    <text x="612" y="1305" font-size="46" font-weight="bold" fill="#F97316">Smart</text>
  </g>
</svg>
